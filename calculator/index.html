<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <h1 class="app-title">Calculator</h1>
        <div class="header-actions">
          <button id="toggle-theme" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
            <span class="icon">☾</span>
          </button>
          <button id="toggle-history" class="icon-btn" title="Toggle history" aria-expanded="false" aria-controls="history-panel">
            <span class="icon">🕘</span>
          </button>
        </div>
      </header>

      <main class="app-main">
        <section class="calculator" aria-label="Calculator">
          <div class="display" aria-live="polite" aria-atomic="true">
            <div id="expression" class="expression" title="Expression"></div>
            <div id="result" class="result" title="Result">0</div>
          </div>

          <div class="keys" role="group" aria-label="Calculator keypad">
            <button data-action="clear-all" class="key key-func">AC</button>
            <button data-action="backspace" class="key key-func" aria-label="Backspace">⌫</button>
            <button data-value="%" class="key key-op" title="Percent">%</button>
            <button data-value="/" data-display="÷" class="key key-op" title="Divide">÷</button>

            <button data-value="7" class="key">7</button>
            <button data-value="8" class="key">8</button>
            <button data-value="9" class="key">9</button>
            <button data-value="*" data-display="×" class="key key-op" title="Multiply">×</button>

            <button data-value="4" class="key">4</button>
            <button data-value="5" class="key">5</button>
            <button data-value="6" class="key">6</button>
            <button data-value="-" class="key key-op" title="Minus">−</button>

            <button data-value="1" class="key">1</button>
            <button data-value="2" class="key">2</button>
            <button data-value="3" class="key">3</button>
            <button data-value="+" class="key key-op" title="Plus">+</button>

            <button data-action="toggle-sign" class="key">±</button>
            <button data-value="0" class="key">0</button>
            <button data-value="." class="key">.</button>
            <button data-action="equals" class="key key-equals" aria-label="Equals">=</button>
          </div>

          <div class="helper-legend">
            <span>Keys: 0-9, + - × ÷, ., Enter, Backspace, Esc</span>
          </div>
        </section>

        <aside id="history-panel" class="history" aria-label="Calculation history">
          <div class="history-header">
            <h2>History</h2>
            <div class="history-actions">
              <button id="copy-last" class="text-btn">Copy last</button>
              <button id="clear-history" class="text-btn">Clear</button>
            </div>
          </div>
          <ol id="history-list" class="history-list" aria-live="polite"></ol>
        </aside>
      </main>

      <footer class="app-footer">
        <span>Keyboard friendly. Results persist locally.</span>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
